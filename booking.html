<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking - Sunrise Avenue</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
  <link rel="stylesheet" href="flat.css" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <a class="navbar-brand" href="index.html">Sunrise Avenue</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ml-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="apartments.html">Apartments</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- Booking Section -->
  <div class="black">
    <!-- Flat Preview -->
    <div class="embed-responsive embed-responsive-16by9 mb-3">
      <iframe id="videoFrame" class="embed-responsive-item" allowfullscreen></iframe>
    </div>
    <h1 id="flatPrice" class="title"></h1>
    <h1 id="slotPrice" class="title"></h1>
    <div class="d-flex flex-row mb-3">
      <img src="https://assets.ccbp.in/frontend/static-website/flats-list-location-icon-img.png" />
      <p id="location" class="para1"></p>
    </div>
    <h1 class="title">Description</h1>
    <p id="description" class="paragraph"></p>

    <!-- Booking Form -->
    <div class="card1 mt-4">
      <h3 class="title">Book Your Flat</h3>
      <form>
        <div class="form-group">
          <label for="name" class="text-dark">Name</label>
          <input type="text" class="form-control" id="name" placeholder="Enter your name" required>
        </div>
        <div class="form-group">
          <label for="email" class="text-dark">Email</label>
          <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="phone" class="text-dark">Phone</label>
          <input type="tel" class="form-control" id="phone" placeholder="Enter your phone number" required>
        </div>
        <div class="form-group">
          <label for="date" class="text-dark">Preferred Booking Date</label>
          <input type="date" class="form-control" id="date" required>
        </div>
        <button type="submit" class="button">Confirm Booking</button>
      </form>
    </div>

    <div class="text-center mt-4">
      <a href="apartments.html" class="button">Back to Apartments</a>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer bg-dark text-light py-4 mt-5">
    <div class="container text-center">
      <p>&copy; 2026 Sunrise Avenue. All rights reserved.</p>
    </div>
  </footer>

  <!-- FontAwesome for icons -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="flat.js"></script>
  <!-- Confirmation Modal -->
<div class="modal fade" id="confirmationModal" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content text-center">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title">Booking Confirmed</h5>
        <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <p id="confirmationMessage" class="paragraph"></p>
      </div>
      <div class="modal-footer">
        <button type="button" class="button" id="downloadReceipt">Download Receipt</button>
        <button type="button" class="button" data-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS (needed for modal) -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
